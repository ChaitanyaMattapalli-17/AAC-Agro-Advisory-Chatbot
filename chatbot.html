<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AAC Chatbot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">AAC</a>
  </div>
</nav>

<div class="container mt-5">
<h2 class="text-success text-center">Ask Your Farming Questions</h2>

<div class="card p-4 mt-4">
<input type="text" id="msg" class="form-control" placeholder="Ask about rice, weather, wheat...">
<button class="btn btn-success mt-3" onclick="send()">Send</button>

<div id="chat" class="mt-4"></div>
</div>
</div>

<script>
function send() {
let message = document.getElementById("msg").value;

fetch("/chat", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ message: message })
})
.then(res => res.json())
.then(data => {
document.getElementById("chat").innerHTML +=
"<p><b>You:</b> " + message + "</p>" +
"<p class='text-success'><b>Bot:</b> " + data.response + "</p>";
});
}
</script>

</body>
</html>
